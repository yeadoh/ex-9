services:
  nginx-app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:fastapi-${IMAGE_TAG}
    container_name: fastapi-container
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - /home/ec2-user/fastapi/app:/app
    networks:
      public-subnet:
        aliases:
          - fastapi-svc

networks:
  public-subnet:
    driver: bridge